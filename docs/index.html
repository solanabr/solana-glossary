<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana Glossary — 1001 Terms</title>
<meta name="description" content="The most comprehensive Solana ecosystem glossary. Search 1001 terms across 14 categories with i18n support.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--purple:#bc8cff;--orange:#f0883e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:1rem}
header{text-align:center;padding:2rem 0 1rem}
header h1{font-size:2rem;background:linear-gradient(135deg,var(--green),var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--muted);margin-top:.5rem}
.stats{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin:1rem 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.5rem 1rem;font-size:.85rem}
.stat strong{color:var(--accent)}
.controls{display:flex;gap:.75rem;margin:1.5rem 0;flex-wrap:wrap}
#search{flex:1;min-width:200px;padding:.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
#search:focus{border-color:var(--accent)}
#category,#locale{padding:.75rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;cursor:pointer}
.results-header{display:flex;justify-content:space-between;align-items:center;margin:.75rem 0;color:var(--muted);font-size:.85rem}
.terms{display:grid;gap:.75rem}
.term-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;transition:border-color .2s;cursor:pointer}
.term-card:hover{border-color:var(--accent)}
.term-card h3{color:var(--accent);font-size:1.05rem;margin-bottom:.25rem}
.term-card .cat{display:inline-block;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:0 .4rem;font-size:.7rem;color:var(--purple);margin-left:.5rem;vertical-align:middle}
.term-card p{color:var(--muted);font-size:.9rem;line-height:1.5}
.term-card .meta{margin-top:.5rem;font-size:.8rem;color:var(--muted)}
.term-card .meta span{margin-right:1rem}
.term-card .related{margin-top:.5rem;display:flex;flex-wrap:wrap;gap:.35rem}
.term-card .related a{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:.1rem .4rem;font-size:.75rem;color:var(--accent);text-decoration:none;transition:background .2s}
.term-card .related a:hover{background:var(--border)}
.expanded{border-color:var(--accent)!important}
.load-more{text-align:center;padding:1rem}
.load-more button{background:var(--accent);color:#fff;border:none;padding:.6rem 2rem;border-radius:8px;font-size:.9rem;cursor:pointer}
.load-more button:hover{opacity:.9}
footer{text-align:center;padding:2rem 0;color:var(--muted);font-size:.8rem}
footer a{color:var(--accent);text-decoration:none}
.quiz-box{background:var(--card);border:2px solid var(--purple);border-radius:10px;padding:1.5rem;margin:1rem 0;display:none}
.quiz-box h3{color:var(--purple);margin-bottom:.75rem}
.quiz-box blockquote{border-left:3px solid var(--purple);padding-left:1rem;color:var(--muted);margin:.75rem 0}
.quiz-box .options{display:grid;gap:.5rem}
.quiz-box .opt{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.6rem 1rem;cursor:pointer;transition:all .2s;font-size:.9rem}
.quiz-box .opt:hover{border-color:var(--accent)}
.quiz-box .opt.correct{border-color:var(--green);background:rgba(63,185,80,.1)}
.quiz-box .opt.wrong{border-color:var(--orange);background:rgba(240,136,62,.1)}
.quiz-btn{background:var(--purple);color:#fff;border:none;padding:.5rem 1.5rem;border-radius:6px;cursor:pointer;font-size:.85rem;margin-top:.5rem}
@media(max-width:600px){.controls{flex-direction:column}#search{min-width:100%}header h1{font-size:1.5rem}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Solana Glossary</h1>
    <p>Search and explore 1,001 Solana ecosystem terms</p>
    <div class="stats" id="stats"></div>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="Search terms, definitions, aliases..." autofocus>
    <select id="category"><option value="">All Categories</option></select>
    <select id="locale">
      <option value="en">English</option>
      <option value="pt">Portugues</option>
      <option value="es">Espanol</option>
    </select>
    <button class="quiz-btn" onclick="startQuiz()">Quiz</button>
  </div>

  <div class="quiz-box" id="quiz"></div>

  <div class="results-header">
    <span id="count"></span>
    <span id="timing"></span>
  </div>

  <div class="terms" id="terms"></div>
  <div class="load-more" id="loadMore" style="display:none">
    <button onclick="loadMore()">Load more</button>
  </div>

  <footer>
    <p>Powered by <a href="https://github.com/solanabr/solana-glossary">@stbr/solana-glossary</a> SDK &mdash; 14 categories, 3 languages</p>
    <p>Built by <a href="https://github.com/ElromEvedElElyon">Padrao Bitcoin</a> for <a href="https://superteam.fun">Superteam Brazil</a></p>
  </footer>
</div>

<script>
// Data loaded inline from JSON files at build time — or fetched at runtime
let allTerms = [];
let i18n = { pt: {}, es: {} };
let filtered = [];
let page = 0;
const PAGE_SIZE = 30;

const TERM_FILES = [
  'ai-ml','blockchain-general','core-protocol','defi','dev-tools',
  'infrastructure','network','programming-fundamentals','programming-model',
  'security','solana-ecosystem','token-ecosystem','web3','zk-compression'
];

async function init() {
  const base = getBasePath();

  // Load all term files
  const promises = TERM_FILES.map(f =>
    fetch(`${base}data/terms/${f}.json`).then(r => r.json()).catch(() => [])
  );
  const results = await Promise.all(promises);
  allTerms = results.flat();

  // Load i18n
  for (const loc of ['pt', 'es']) {
    try {
      i18n[loc] = await fetch(`${base}data/i18n/${loc}.json`).then(r => r.json());
    } catch {}
  }

  // Populate categories
  const cats = [...new Set(allTerms.map(t => t.category))].sort();
  const sel = document.getElementById('category');
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c.replace(/-/g, ' ');
    sel.appendChild(o);
  });

  // Stats
  const withDef = allTerms.filter(t => t.definition).length;
  const totalRels = allTerms.reduce((s, t) => s + (t.related?.length || 0), 0);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><strong>${allTerms.length}</strong> terms</div>
    <div class="stat"><strong>${cats.length}</strong> categories</div>
    <div class="stat"><strong>${totalRels}</strong> cross-refs</div>
    <div class="stat"><strong>3</strong> languages</div>
  `;

  applyFilter();

  // Event listeners
  document.getElementById('search').addEventListener('input', debounce(applyFilter, 150));
  document.getElementById('category').addEventListener('change', applyFilter);
  document.getElementById('locale').addEventListener('change', applyFilter);
}

function getBasePath() {
  // Works both from docs/ and from repo root
  const path = window.location.pathname;
  if (path.includes('/docs/')) return '../';
  return '../';
}

function localize(term) {
  const loc = document.getElementById('locale').value;
  if (loc === 'en') return term;
  const o = i18n[loc]?.[term.id];
  if (!o) return term;
  return { ...term, term: o.term || term.term, definition: o.definition || term.definition };
}

function applyFilter() {
  const t0 = performance.now();
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cat = document.getElementById('category').value;

  filtered = allTerms.filter(t => {
    if (cat && t.category !== cat) return false;
    if (!q) return true;
    return t.term.toLowerCase().includes(q) ||
           t.definition.toLowerCase().includes(q) ||
           t.id.includes(q) ||
           t.aliases?.some(a => a.toLowerCase().includes(q));
  });

  const elapsed = (performance.now() - t0).toFixed(1);
  document.getElementById('count').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;
  document.getElementById('timing').textContent = `${elapsed}ms`;

  page = 0;
  document.getElementById('terms').innerHTML = '';
  loadMore();
}

function loadMore() {
  const container = document.getElementById('terms');
  const start = page * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  slice.forEach(rawTerm => {
    const t = localize(rawTerm);
    const card = document.createElement('div');
    card.className = 'term-card';
    card.onclick = () => card.classList.toggle('expanded');

    let html = `<h3>${esc(t.term)}<span class="cat">${t.category}</span></h3>`;
    html += `<p>${esc(t.definition || 'No definition yet.')}</p>`;

    const meta = [];
    if (t.aliases?.length) meta.push(`<span>aka: ${t.aliases.map(esc).join(', ')}</span>`);
    if (meta.length) html += `<div class="meta">${meta.join('')}</div>`;

    if (t.related?.length) {
      html += `<div class="related">${t.related.map(r =>
        `<a href="#" onclick="event.stopPropagation();searchFor('${r}')">${r}</a>`
      ).join('')}</div>`;
    }

    card.innerHTML = html;
    container.appendChild(card);
  });

  page++;
  const btn = document.getElementById('loadMore');
  btn.style.display = (start + PAGE_SIZE < filtered.length) ? '' : 'none';
}

function searchFor(id) {
  document.getElementById('search').value = id;
  applyFilter();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startQuiz() {
  const box = document.getElementById('quiz');
  const pool = allTerms.filter(t => t.definition.length > 30);
  if (pool.length < 4) return;

  const shuffled = pool.sort(() => Math.random() - 0.5);
  const answer = localize(shuffled[0]);
  const distractors = shuffled.slice(1, 4).map(localize);
  const options = [answer, ...distractors].sort(() => Math.random() - 0.5);
  const correctIdx = options.indexOf(answer);

  box.style.display = 'block';
  box.innerHTML = `
    <h3>Quiz Time</h3>
    <blockquote>${esc(answer.definition)}</blockquote>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:.5rem">What term is this?</p>
    <div class="options">
      ${options.map((o, i) => `<div class="opt" data-i="${i}" onclick="checkQuiz(this,${i},${correctIdx})">${esc(o.term)}</div>`).join('')}
    </div>
    <button class="quiz-btn" onclick="startQuiz()" style="margin-top:1rem">Next Question</button>
  `;
  box.scrollIntoView({ behavior: 'smooth' });
}

function checkQuiz(el, picked, correct) {
  const opts = el.parentElement.querySelectorAll('.opt');
  opts.forEach((o, i) => {
    o.style.pointerEvents = 'none';
    if (i === correct) o.classList.add('correct');
    if (i === picked && i !== correct) o.classList.add('wrong');
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

init();
</script>
</body>
</html>
